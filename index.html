<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>계절밥! 누가 만들어 주세요! </title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #f2efe9; /* 지도 느낌 배경색 */
    }

    #map {
      width: 100vw;
      height: 100vh;
      background: #f2efe9; /* 여백도 자연스럽게 */
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  const imageWidth = 1200;
  const imageHeight = 1200;

  const map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -1,
    maxZoom: 2
  });

  const bounds = [[0,0], [imageHeight, imageWidth]];

  const image = L.imageOverlay('map.png', bounds).addTo(map);

  map.fitBounds(bounds);

  // ===== 마커 함수 =====
  function addPoint(x, y, title, author, link) {
    L.marker([y, x]).addTo(map)
      .bindTooltip(`${title}<br>${author}`)
      .on('click', () => {
        window.open(link, '_blank');
      });
  }

  // 예시
  addPoint(600, 400, "2026 봄 맛집", "grua", "https://www.postype.com/@2026grua");
  addPoint(300, 800, "곰도리네 맛집", "grua 별관", "http://grua.kr/");

</script>

</body>
</html>
