<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>가상 지도</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
    }
    #map {
      width: 800px;
      height: 800px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  // 이미지 크기 (중요: 실제 이미지 크기로 맞추기)
  const imageWidth = 1200;
  const imageHeight = 1200;

  // 지도 생성 (좌표계 대신 픽셀 좌표 사용)
  const map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -1
  });

  const bounds = [[0,0], [imageHeight, imageWidth]];

  // 이미지 넣기 (파일명 맞춰주세요)
  const image = L.imageOverlay('map.png', bounds).addTo(map);

  map.fitBounds(bounds);

  // =========================
  // 📍 마커 + 포스타입 링크
  // =========================

  function addPoint(x, y, title, author, link) {
    L.marker([y, x]).addTo(map)
      .bindTooltip(`${title}<br>${author}`)
      .on('click', () => {
        window.open(link, '_blank');
      });
  }

  // 예시 데이터
  addPoint(600, 400, "작품 제목1", "작가A", "https://postype.com/@example1");
  addPoint(300, 800, "작품 제목2", "작가B", "https://postype.com/@example2");

</script>

</body>
</html>
