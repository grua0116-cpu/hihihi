<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>계절밥! 누가 만들어 주세요! </title>

<style>
body {
  margin: 0;
  background: #000;
}

.map-container {
  position: relative;
  width: 100%;
  max-width: 800px;
  margin: auto;
}

.map-container img {
  width: 100%;
  display: block;
}

/* 클릭 영역 */
.hotspot {
  position: absolute;
  cursor: pointer;
}

/* 툴팁 */
.tooltip {
  position: absolute;
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 6px 10px;
  font-size: 12px;
  border-radius: 6px;
  white-space: nowrap;
  display: none;
  transform: translate(-50%, -120%);
  pointer-events: none;
}
</style>

</head>
<body>

<div class="map-container">

  <!-- 지도 -->
  <img src="map.png" alt="지도">

  <!-- 툴팁 -->
  <div id="tooltip" class="tooltip"></div>

  <!-- 영역 1 -->
  <div class="hotspot" 
       style="top:20%; left:30%; width:60px; height:60px;"
       data-title="아는 사랑 / 사자"
       data-link="https://www.postype.com/@sajasaja/post/22092033">
  </div>

  <!-- 영역 2 -->
  <div class="hotspot" 
       style="top:50%; left:60%; width:60px; height:60px;"
       data-title="작품 제목 2 / 작가명"
       data-link="https://postype.com">
  </div>

</div>

<script>
const tooltip = document.getElementById("tooltip");

document.querySelectorAll(".hotspot").forEach(el => {

  el.addEventListener("mouseenter", e => {
    tooltip.style.display = "block";
    tooltip.innerText = el.dataset.title;
  });

  el.addEventListener("mousemove", e => {
    tooltip.style.left = e.pageX + "px";
    tooltip.style.top = e.pageY + "px";
  });

  el.addEventListener("mouseleave", () => {
    tooltip.style.display = "none";
  });

  el.addEventListener("click", () => {
    window.open(el.dataset.link, "_blank");
  });

});
</script>

</body>
</html>
