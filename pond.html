<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>연못의 꼬리물기</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: #e6e6e6;
  font-family: "Pretendard", "Noto Sans KR", sans-serif;
}

.wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 36px 18px;
}

.box {
  border: 1px solid #333;
  background: #111;
  padding: 18px;
  margin-bottom: 18px;
}

h1 {
  font-size: 24px;
  margin: 0 0 8px;
}

.sub,
.small {
  color: #888;
  font-size: 13px;
  line-height: 1.7;
}

input,
textarea,
button {
  width: 100%;
  box-sizing: border-box;
  background: #070707;
  color: #eee;
  border: 1px solid #333;
  padding: 12px;
  margin-top: 10px;
  font-size: 14px;
}

textarea {
  min-height: 90px;
  resize: vertical;
}

button {
  cursor: pointer;
  background: #181818;
}

button:hover {
  background: #222;
}

button:disabled {
  opacity: .45;
  cursor: not-allowed;
}

.ok {
  color: #9be28f;
}

.danger {
  color: #ff6b6b;
}

.comment {
  border-top: 1px solid #222;
  padding-top: 12px;
  margin-top: 12px;
  font-size: 13px;
  line-height: 1.7;
}

.name {
  color: #e6e6e6;
  font-weight: 600;
}

.system {
  color: #b85a5a;
}

.meta {
  color: #666;
  font-size: 12px;
  margin-top: 4px;
}

.notice {
  color: #777;
  font-size: 12px;
  line-height: 1.6;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>연못의 꼬리물기</h1>
  <div class="sub">호명된 번호만 다음 번호를 부를 수 있습니다.</div>

  <div class="box">
    <div>내 번호: <span id="myNumber">확인 중...</span></div>
    <div>현재 호명된 번호: <span id="currentNumber">확인 중...</span></div>
    <div>현재 라운드: <span id="round">-</span></div>
  </div>

  <div class="box" id="turnBox">
    <div class="small">접속 정보를 확인 중입니다.</div>
  </div>

  <div class="box">
    <strong>기록</strong>
    <div id="comments" class="small">불러오는 중...</div>
    <button id="loadMoreBtn">더 보기</button>
  </div>

  <div class="notice">
    ※ 같은 브라우저에서는 같은 번호가 유지됩니다. 브라우저를 바꾸거나 시크릿 모드를 사용하면 다른 번호가 부여될 수 있습니다.
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInAnonymously,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  addDoc,
  collection,
  query,
  orderBy,
  limit,
  startAfter,
  onSnapshot,
  getDocs,
  runTransaction,
  serverTimestamp,
  increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBR7ogWqmI1osy45YU7YI_hFcIfjTlk7s4",
  authDomain: "teamgrua-2d9b9.firebaseapp.com",
  projectId: "teamgrua-2d9b9",
  storageBucket: "teamgrua-2d9b9.firebasestorage.app",
  messagingSenderId: "195186066793",
  appId: "1:195186066793:web:14eb2976f5f1b7304c69f8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const myNumberEl = document.getElementById("myNumber");
const currentNumberEl = document.getElementById("currentNumber");
const roundEl = document.getElementById("round");
const turnBox = document.getElementById("turnBox");
const commentsEl = document.getElementById("comments");
const loadMoreBtn = document.getElementById("loadMoreBtn");

let uid = null;
let myNumber = null;
let currentNumber = null;
let currentRound = 1;
let lastVisible = null;
let liveComments = [];
let olderLoaded = [];
let stateWatcherStarted = false;
let commentWatcherStarted = false;

const systemSentences = [
  "문장이 기록되었습니다.",
  "다음 번호가 호명되었습니다.",
  "연못의 꼬리가 이어졌습니다.",
  "이전 기록은 보존됩니다.",
  "응답이 확인되었습니다."
];

function pad(n) {
  return "#" + String(n).padStart(3, "0");
}

function escapeHTML(str) {
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

async function ensureUser(user) {
  uid = user.uid;

  const userRef = doc(db, "pondUsers", uid);
  const existingUser = await getDoc(userRef);

  if (existingUser.exists()) {
    myNumber = existingUser.data().number;
    myNumberEl.textContent = pad(myNumber);
    return;
  }

  await runTransaction(db, async (tx) => {
    const counterRef = doc(db, "pond", "counter");
    const stateRef = doc(db, "pond", "state");

    const counterSnap = await tx.get(counterRef);
    const stateSnap = await tx.get(stateRef);

    let nextNumber = 1;

    if (counterSnap.exists()) {
      nextNumber = counterSnap.data().nextNumber || 1;
    }

    const numberRef = doc(db, "pondNumbers", String(nextNumber));

    tx.set(userRef, {
      uid: uid,
      number: nextNumber,
      createdAt: serverTimestamp()
    });

    tx.set(numberRef, {
      uid: uid,
      number: nextNumber,
      createdAt: serverTimestamp()
    });

    tx.set(counterRef, {
      nextNumber: nextNumber + 1,
      updatedAt: serverTimestamp()
    }, { merge: true });

    if (!stateSnap.exists()) {
      tx.set(stateRef, {
        currentNumber: 1,
        round: 1,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
    }

    myNumber = nextNumber;
  });

  myNumberEl.textContent = pad(myNumber);
}

function watchState() {
  if (stateWatcherStarted) return;
  stateWatcherStarted = true;

  const stateRef = doc(db, "pond", "state");

  onSnapshot(stateRef, (snap) => {
    if (!snap.exists()) {
      currentNumberEl.textContent = "생성 중...";
      roundEl.textContent = "-";
      return;
    }

    const data = snap.data();

    currentNumber = data.currentNumber || 1;
    currentRound = data.round || 1;

    currentNumberEl.textContent = pad(currentNumber);
    roundEl.textContent = currentRound;

    renderTurnBox();
  }, (error) => {
    console.error(error);
    turnBox.innerHTML = `
      <strong class="danger">상태 불러오기 실패</strong>
      <p class="small">${escapeHTML(error.message)}</p>
    `;
  });
}

function renderTurnBox() {
  if (!myNumber || !currentNumber) return;

  if (myNumber === currentNumber) {
    turnBox.innerHTML = `
      <strong class="ok">당신의 차례입니다.</strong>
      <p class="small">문장을 남긴 뒤, 다음 번호를 호명하십시오.</p>
      <textarea id="commentInput" placeholder="연못에 남길 문장을 입력하세요."></textarea>
      <input id="targetInput" type="number" placeholder="다음 번호 입력 예: 17" />
      <button id="submitBtn">다음 사람 호명</button>
    `;

    document.getElementById("submitBtn").addEventListener("click", submitTurn);
  } else {
    turnBox.innerHTML = `
      <strong class="danger">아직 당신의 차례가 아닙니다.</strong>
      <p class="small">현재 ${pad(currentNumber)} 이 응답해야 합니다.</p>
    `;
  }
}

async function submitTurn() {
  const commentInput = document.getElementById("commentInput");
  const targetInput = document.getElementById("targetInput");
  const submitBtn = document.getElementById("submitBtn");

  const content = commentInput.value.trim();
  const targetNumber = Number(targetInput.value);

  if (!content) {
    alert("문장을 입력하세요.");
    return;
  }

  if (!targetNumber || targetNumber <= 0) {
    alert("다음 번호를 입력하세요.");
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = "기록 중...";

  try {
    let savedRound = null;

    await runTransaction(db, async (tx) => {
      const stateRef = doc(db, "pond", "state");
      const targetRef = doc(db, "pondNumbers", String(targetNumber));

      const stateSnap = await tx.get(stateRef);
      const targetSnap = await tx.get(targetRef);

      if (!stateSnap.exists()) {
        throw new Error("연못 상태가 없습니다.");
      }

      const state = stateSnap.data();

      if (state.currentNumber !== myNumber) {
        throw new Error("이미 차례가 넘어갔습니다.");
      }

      if (!targetSnap.exists()) {
        throw new Error("아직 존재하지 않는 번호입니다.");
      }

      savedRound = state.round || 1;

      tx.update(stateRef, {
        currentNumber: targetNumber,
        round: increment(1),
        updatedAt: serverTimestamp()
      });
    });

    await addDoc(collection(db, "pondComments"), {
      type: "user",
      authorNumber: myNumber,
      targetNumber: targetNumber,
      content: content,
      round: savedRound,
      createdAt: serverTimestamp()
    });

    const sentence = systemSentences[Math.floor(Math.random() * systemSentences.length)];

    await addDoc(collection(db, "pondComments"), {
      type: "system",
      authorName: "관리자",
      authorNumber: null,
      targetNumber: targetNumber,
      content: `${sentence}\n다음 대상은 ${pad(targetNumber)} 입니다.`,
      round: savedRound,
      createdAt: serverTimestamp()
    });

    commentInput.value = "";
    targetInput.value = "";

  } catch (error) {
    console.error(error);
    alert(error.message);
  }

  submitBtn.disabled = false;
  submitBtn.textContent = "다음 사람 호명";
}

function renderComments(list) {
  const all = [...list, ...olderLoaded];

  if (!all.length) {
    commentsEl.textContent = "아직 기록이 없습니다.";
    return;
  }

  commentsEl.innerHTML = all.map((c) => {
    const name = c.type === "system"
      ? `<span class="name system">관리자</span>`
      : `<span class="name">${pad(c.authorNumber)}</span>`;

    const content = escapeHTML(c.content).replaceAll("\n", "<br>");
    const target = c.targetNumber ? `<div class="meta">호명: ${pad(c.targetNumber)}</div>` : "";
    const roundText = c.round ? `<div class="meta">ROUND ${c.round}</div>` : "";

    return `
      <div class="comment">
        ${name}<br>
        ${content}
        ${target}
        ${roundText}
      </div>
    `;
  }).join("");
}

function watchComments() {
  if (commentWatcherStarted) return;
  commentWatcherStarted = true;

  const q = query(
    collection(db, "pondComments"),
    orderBy("createdAt", "desc"),
    limit(50)
  );

  onSnapshot(q, (snap) => {
    liveComments = [];

    snap.forEach((docSnap) => {
      liveComments.push({
        id: docSnap.id,
        ...docSnap.data()
      });
    });

    lastVisible = snap.docs[snap.docs.length - 1] || null;

    if (!lastVisible) {
      loadMoreBtn.disabled = true;
      loadMoreBtn.textContent = "더 보기";
    } else {
      loadMoreBtn.disabled = false;
      loadMoreBtn.textContent = "더 보기";
    }

    renderComments(liveComments);
  }, (error) => {
    console.error(error);
    commentsEl.textContent = "기록 불러오기 실패: " + error.message;
  });
}

async function loadMore() {
  if (!lastVisible) return;

  loadMoreBtn.disabled = true;
  loadMoreBtn.textContent = "불러오는 중...";

  try {
    const q = query(
      collection(db, "pondComments"),
      orderBy("createdAt", "desc"),
      startAfter(lastVisible),
      limit(50)
    );

    const snap = await getDocs(q);

    if (snap.empty) {
      loadMoreBtn.textContent = "더 이상 기록이 없습니다.";
      return;
    }

    snap.forEach((docSnap) => {
      olderLoaded.push({
        id: docSnap.id,
        ...docSnap.data()
      });
    });

    lastVisible = snap.docs[snap.docs.length - 1] || lastVisible;

    loadMoreBtn.disabled = false;
    loadMoreBtn.textContent = "더 보기";

    renderComments(liveComments);

  } catch (error) {
    console.error(error);
    loadMoreBtn.disabled = false;
    loadMoreBtn.textContent = "더 보기";
    alert(error.message);
  }
}

loadMoreBtn.addEventListener("click", loadMore);

onAuthStateChanged(auth, async (user) => {


  onAuthStateChanged(auth, async (user) => {
  if (!user) {
    alert("아직 로그인 안 됨");
    return;
  }

  alert("MY UID: " + user.uid);
  console.log("MY UID:", user.uid);

  try {
    await ensureUser(user);
    watchState();
    watchComments();
  } catch (error) {
    console.error(error);

    turnBox.innerHTML = `
      <strong class="danger">접속 실패</strong>
      <p class="small">${escapeHTML(error.message)}</p>
    `;

    commentsEl.textContent = "Firebase 연결 실패";
  }
});

signInAnonymously(auth)
  .then((result) => {
    alert("익명 로그인 성공 UID: " + result.user.uid);
    console.log("익명 로그인 성공 UID:", result.user.uid);
  })
  .catch((error) => {
    alert("익명 로그인 실패: " + error.message);
    console.error(error);
  });
