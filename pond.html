<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>연못의 꼬리물기</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: #e6e6e6;
  font-family: "Pretendard", "Noto Sans KR", sans-serif;
}

.wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 36px 18px;
}

h1 {
  font-size: 24px;
  margin: 0 0 8px;
}

.sub {
  color: #888;
  font-size: 13px;
  margin-bottom: 28px;
}

.box {
  border: 1px solid #333;
  background: #111;
  padding: 18px;
  margin-bottom: 18px;
}

.small {
  color: #888;
  font-size: 13px;
  line-height: 1.7;
}

input,
textarea,
button {
  width: 100%;
  box-sizing: border-box;
  background: #070707;
  color: #eee;
  border: 1px solid #333;
  padding: 12px;
  margin-top: 10px;
  font-size: 14px;
}

textarea {
  min-height: 100px;
  resize: vertical;
}

button {
  cursor: pointer;
  background: #181818;
}

button:hover {
  background: #222;
}

button:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.ok {
  color: #9be28f;
}

.danger {
  color: #ff6b6b;
}

.admin-blue {
  color: #7fc8ff;
  font-weight: 700;
}

.comment {
  border-top: 1px solid #222;
  padding-top: 12px;
  margin-top: 12px;
  font-size: 13px;
  line-height: 1.7;
}

.author {
  color: #e6e6e6;
  font-weight: 600;
}

.author.admin {
  color: #7fc8ff;
  font-weight: 700;
}

.meta {
  color: #666;
  font-size: 12px;
  margin-top: 4px;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>연못의 꼬리물기</h1>
  <div class="sub">호명된 사람은 다음 번호만 호명할 수 있습니다.</div>

  <div class="box">
    <div>내 번호: <span id="myNumber">확인 중...</span></div>
    <div>현재 호명된 번호: <span id="currentCaller">없음</span></div>
    <div>권한: <span id="roleText">확인 중...</span></div>
  </div>

  <div class="box" id="writeBox">
    <div class="small">접속 정보를 확인 중입니다.</div>
  </div>

  <div class="box">
    <strong>기록</strong>
    <div id="comments" class="small">불러오는 중...</div>
    <button id="loadMoreBtn">더 보기</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInAnonymously,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  collection,
  query,
  orderBy,
  limit,
  startAfter,
  onSnapshot,
  getDocs,
  runTransaction,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBR7ogWqmI1osy45YU7YI_hFcIfjTlk7s4",
  authDomain: "teamgrua-2d9b9.firebaseapp.com",
  projectId: "teamgrua-2d9b9",
  storageBucket: "teamgrua-2d9b9.firebasestorage.app",
  messagingSenderId: "195186066793",
  appId: "1:195186066793:web:14eb2976f5f1b7304c69f8"
};

const ADMIN_UIDS = [
  "MpLrmXujB7VKOKGAhWYG7IqAx9Z2"
];

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const myNumberEl = document.getElementById("myNumber");
const currentCallerEl = document.getElementById("currentCaller");
const roleTextEl = document.getElementById("roleText");
const writeBox = document.getElementById("writeBox");
const commentsEl = document.getElementById("comments");
const loadMoreBtn = document.getElementById("loadMoreBtn");

let uid = null;
let myNumber = null;
let isAdmin = false;
let currentCaller = null;
let isUsed = false;

let liveComments = [];
let olderComments = [];
let lastVisible = null;

function pad(n) {
  return "#" + String(n).padStart(3, "0");
}

function escapeHTML(str) {
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function extractNumber(text) {
  const match = String(text).match(/#\s*(\d{1,5})/);
  if (!match) return null;
  return Number(match[1]);
}

async function ensureUser(user) {
  uid = user.uid;
  isAdmin = ADMIN_UIDS.includes(uid);

  const userRef = doc(db, "pondUsers", uid);
  const userSnap = await getDoc(userRef);

  if (userSnap.exists()) {
    myNumber = userSnap.data().number;
    myNumberEl.textContent = pad(myNumber);
    roleTextEl.textContent = isAdmin ? "관리자" : "참가자";
    if (isAdmin) roleTextEl.className = "admin-blue";
    return;
  }

  await runTransaction(db, async (tx) => {
    const counterRef = doc(db, "pond", "counter");
    const stateRef = doc(db, "pond", "state");

    const counterSnap = await tx.get(counterRef);
    const stateSnap = await tx.get(stateRef);

    let nextNumber = 1;

    if (counterSnap.exists()) {
      nextNumber = counterSnap.data().nextNumber || 1;
    }

    const numberRef = doc(db, "pondNumbers", String(nextNumber));

    tx.set(userRef, {
      uid,
      number: nextNumber,
      isAdmin,
      createdAt: serverTimestamp()
    });

    tx.set(numberRef, {
      uid,
      number: nextNumber,
      createdAt: serverTimestamp()
    });

    tx.set(counterRef, {
      nextNumber: nextNumber + 1,
      updatedAt: serverTimestamp()
    }, { merge: true });

    if (!stateSnap.exists()) {
      tx.set(stateRef, {
        currentCaller: null,
        updatedAt: serverTimestamp()
      });
    }

    myNumber = nextNumber;
  });

  myNumberEl.textContent = pad(myNumber);
  roleTextEl.textContent = isAdmin ? "관리자" : "참가자";
  if (isAdmin) roleTextEl.className = "admin-blue";
}

function watchState() {
  const stateRef = doc(db, "pond", "state");

  onSnapshot(stateRef, async (snap) => {
    if (!snap.exists()) {
      currentCaller = null;
      currentCallerEl.textContent = "없음";
      renderWriteBox();
      return;
    }

    const data = snap.data();
    currentCaller = data.currentCaller ?? null;
    currentCallerEl.textContent = currentCaller ? pad(currentCaller) : "없음";

    await checkUsed();
    renderWriteBox();
  });
}

async function checkUsed() {
  if (!myNumber) return;

  const usedRef = doc(db, "pondUsedNumbers", String(myNumber));
  const usedSnap = await getDoc(usedRef);

  isUsed = usedSnap.exists();
}

function renderWriteBox() {
  if (!myNumber) return;

  if (isAdmin) {
    writeBox.innerHTML = `
      <strong class="admin-blue">관리자 모드</strong>
      <p class="small">
        관리자 댓글은 언제든 작성 가능합니다.<br>
        댓글 안에 #번호를 쓰면 그 번호가 현재 호명 번호로 설정됩니다.
      </p>
      <textarea id="commentInput" placeholder="관리자 댓글을 입력하세요. 예: #014"></textarea>
      <button id="submitBtn">관리자 댓글 등록</button>
    `;

    document.getElementById("submitBtn").addEventListener("click", submitComment);
    return;
  }

  if (isUsed) {
    writeBox.innerHTML = `
      <strong class="danger">이미 호명 완료되었습니다.</strong>
      <p class="small">당신은 더 이상 댓글을 작성할 수 없습니다.</p>
    `;
    return;
  }

  if (currentCaller === myNumber) {
    writeBox.innerHTML = `
      <strong class="ok">당신이 호명되었습니다.</strong>
      <p class="small">
        다음 번호만 호명할 수 있습니다.<br>
        댓글 안에 반드시 #번호를 포함해야 합니다.
      </p>
      <textarea id="commentInput" placeholder="예: #027"></textarea>
      <button id="submitBtn">다음 번호 호명</button>
    `;

    document.getElementById("submitBtn").addEventListener("click", submitComment);
    return;
  }

  writeBox.innerHTML = `
    <strong>댓글 작성 가능</strong>
    <p class="small">
      아직 호명되지 않았습니다. 자유 댓글을 남길 수 있습니다.<br>
      단, 당신의 댓글에 #번호가 있어도 호명으로 처리되지 않습니다.
    </p>
    <textarea id="commentInput" placeholder="댓글을 입력하세요."></textarea>
    <button id="submitBtn">댓글 등록</button>
  `;

  document.getElementById("submitBtn").addEventListener("click", submitComment);
}

async function submitComment() {
  const input = document.getElementById("commentInput");
  const btn = document.getElementById("submitBtn");

  const content = input.value.trim();

  if (!content) {
    alert("댓글을 입력하세요.");
    return;
  }

  btn.disabled = true;
  btn.textContent = "등록 중...";

  try {
    const mentionedNumber = extractNumber(content);

    await runTransaction(db, async (tx) => {
      const stateRef = doc(db, "pond", "state");
      const stateSnap = await tx.get(stateRef);

      const myUsedRef = doc(db, "pondUsedNumbers", String(myNumber));
      const myUsedSnap = await tx.get(myUsedRef);

      let latestCaller = null;

      if (stateSnap.exists()) {
        latestCaller = stateSnap.data().currentCaller ?? null;
      }

      if (!isAdmin && myUsedSnap.exists()) {
        throw new Error("이미 호명 완료되어 댓글을 작성할 수 없습니다.");
      }

      let nextCaller = latestCaller;
      let shouldMarkUsed = false;

      if (isAdmin) {
        if (mentionedNumber) {
          const targetNumberRef = doc(db, "pondNumbers", String(mentionedNumber));
          const targetNumberSnap = await tx.get(targetNumberRef);

          if (!targetNumberSnap.exists()) {
            throw new Error("아직 존재하지 않는 번호입니다.");
          }

          const targetUsedRef = doc(db, "pondUsedNumbers", String(mentionedNumber));
          const targetUsedSnap = await tx.get(targetUsedRef);

          if (targetUsedSnap.exists()) {
            throw new Error("이미 호명 완료된 번호입니다.");
          }

          nextCaller = mentionedNumber;
        }
      } else if (latestCaller === myNumber) {
        if (!mentionedNumber) {
          throw new Error("다음 번호를 #027 형식으로 호명해야 합니다.");
        }

        if (mentionedNumber === myNumber) {
          throw new Error("자기 자신을 호명할 수 없습니다.");
        }

        const targetNumberRef = doc(db, "pondNumbers", String(mentionedNumber));
        const targetNumberSnap = await tx.get(targetNumberRef);

        if (!targetNumberSnap.exists()) {
          throw new Error("아직 존재하지 않는 번호입니다.");
        }

        const targetUsedRef = doc(db, "pondUsedNumbers", String(mentionedNumber));
        const targetUsedSnap = await tx.get(targetUsedRef);

        if (targetUsedSnap.exists()) {
          throw new Error("이미 호명 완료된 번호입니다.");
        }

        nextCaller = mentionedNumber;
        shouldMarkUsed = true;
      }

      const commentRef = doc(collection(db, "pondComments"));

      tx.set(commentRef, {
        type: isAdmin ? "admin" : "user",
        authorNumber: isAdmin ? null : myNumber,
        content,
        mentionedNumber: mentionedNumber || null,
        createdAt: serverTimestamp()
      });

      if (shouldMarkUsed) {
        tx.set(myUsedRef, {
          number: myNumber,
          usedAt: serverTimestamp()
        });
      }

      tx.set(stateRef, {
        currentCaller: nextCaller,
        updatedAt: serverTimestamp()
      }, { merge: true });
    });

    input.value = "";

  } catch (error) {
    console.error(error);
    alert(error.message);
  }

  btn.disabled = false;
  btn.textContent = isAdmin ? "관리자 댓글 등록" : "댓글 등록";
}

function renderComments() {
  const all = [...olderComments, ...liveComments];

  if (!all.length) {
    commentsEl.textContent = "아직 기록이 없습니다.";
    return;
  }

  commentsEl.innerHTML = all.map((c) => {
    const isAdminComment = c.type === "admin";

    const author = isAdminComment
      ? `<span class="author admin">관리자</span>`
      : `<span class="author">${pad(c.authorNumber)}</span>`;

    const content = escapeHTML(c.content).replaceAll("\n", "<br>");

    return `
      <div class="comment">
        ${author}<br>
        ${content}
      </div>
    `;
  }).join("");
}

function watchComments() {
  const q = query(
    collection(db, "pondComments"),
    orderBy("createdAt", "desc"),
    limit(50)
  );

  onSnapshot(q, (snap) => {
    const temp = [];

    snap.forEach((docSnap) => {
      temp.push({
        id: docSnap.id,
        ...docSnap.data()
      });
    });

    liveComments = temp.reverse();
    lastVisible = snap.docs[snap.docs.length - 1] || null;

    renderComments();

    if (!lastVisible) {
      loadMoreBtn.disabled = true;
    } else {
      loadMoreBtn.disabled = false;
    }
  }, (error) => {
    console.error(error);
    commentsEl.textContent = "기록 불러오기 실패: " + error.message;
  });
}

async function loadMore() {
  if (!lastVisible) return;

  loadMoreBtn.disabled = true;
  loadMoreBtn.textContent = "불러오는 중...";

  try {
    const q = query(
      collection(db, "pondComments"),
      orderBy("createdAt", "desc"),
      startAfter(lastVisible),
      limit(50)
    );

    const snap = await getDocs(q);

    if (snap.empty) {
      loadMoreBtn.textContent = "더 이상 기록이 없습니다.";
      return;
    }

    const temp = [];

    snap.forEach((docSnap) => {
      temp.push({
        id: docSnap.id,
        ...docSnap.data()
      });
    });

    olderComments = [...temp.reverse(), ...olderComments];
    lastVisible = snap.docs[snap.docs.length - 1];

    renderComments();

    loadMoreBtn.disabled = false;
    loadMoreBtn.textContent = "더 보기";

  } catch (error) {
    console.error(error);
    alert(error.message);
    loadMoreBtn.disabled = false;
    loadMoreBtn.textContent = "더 보기";
  }
}

loadMoreBtn.addEventListener("click", loadMore);

onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  try {
    await ensureUser(user);
    watchState();
    watchComments();
  } catch (error) {
    console.error(error);
    writeBox.innerHTML = `
      <strong class="danger">접속 실패</strong>
      <p class="small">${escapeHTML(error.message)}</p>
    `;
  }
});

signInAnonymously(auth).catch((error) => {
  console.error(error);
  writeBox.innerHTML = `
    <strong class="danger">익명 로그인 실패</strong>
    <p class="small">${escapeHTML(error.message)}</p>
  `;
});
</script>
</body>
</html>
